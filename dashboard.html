<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Dashboard | Tech Class Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Exo 2', sans-serif; background: #0a000f; color: #f0e6ff; min-height: 100vh; }

    .topnav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px;
      background: rgba(10,0,15,0.88); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(180,79,255,0.3);
    }
    .nav-brand { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 900; color: #ff2d78; text-decoration: none; letter-spacing: 3px; text-shadow: 0 0 12px rgba(255,45,120,0.7); }
    .nav-links { display: flex; gap: 6px; }
    .nav-link { text-decoration: none; color: #9080b0; padding: 7px 14px; border-radius: 6px; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.5px; transition: color 0.2s, background 0.2s; border: 1px solid transparent; }
    .nav-link:hover { color: #fff; background: rgba(180,79,255,0.15); }
    .nav-link.active { color: #ff2d78; background: rgba(255,45,120,0.08); border-color: rgba(255,45,120,0.3); }
    @media (max-width: 600px) { .topnav { padding: 12px 16px; } .nav-link { padding: 6px 10px; font-size: 0.75rem; } }
    .auth-btn { display:flex; align-items:center; gap:6px; background:rgba(180,79,255,0.12); border:1px solid rgba(180,79,255,0.35); border-radius:20px; padding:6px 14px; cursor:pointer; font-family:'Exo 2',sans-serif; font-size:0.8rem; font-weight:600; color:#c0a0e0; letter-spacing:0.5px; transition:all 0.2s; white-space:nowrap; }
    .auth-btn:hover { background:rgba(180,79,255,0.25); border-color:rgba(180,79,255,0.6); color:#fff; }
    .auth-btn.signed-in { border-color:rgba(0,245,255,0.35); color:#00f5ff; background:rgba(0,245,255,0.08); }
    .auth-btn img { width:22px; height:22px; border-radius:50%; }

    .banner {
      margin-top: 60px;
      background: linear-gradient(135deg, #0a000f 0%, #1a0020 50%, #0a000f 100%);
      padding: 50px 20px 40px;
      text-align: center;
      border-bottom: 2px solid rgba(255,45,120,0.3);
    }
    .banner-title { font-family: 'Orbitron', sans-serif; font-size: clamp(1.6rem, 5vw, 2.8rem); font-weight: 900; color: #ff2d78; letter-spacing: 4px; text-shadow: 0 0 20px rgba(255,45,120,0.6); }
    .banner-sub { color: #9080b0; font-size: 0.95rem; margin-top: 8px; letter-spacing: 2px; }

    .content { max-width: 1100px; margin: 0 auto; padding: 50px 20px 80px; }

    #dash-status {
      text-align: center; padding: 60px 20px;
      font-family: 'Orbitron', sans-serif; font-size: 1rem; color: #9080b0; letter-spacing: 2px;
    }

    /* Controls bar */
    .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 28px; }
    .filter-label { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: #9080b0; letter-spacing: 2px; }
    .filter-btn { background: rgba(255,45,120,0.08); border: 1px solid rgba(255,45,120,0.25); border-radius: 20px; padding: 6px 14px; cursor: pointer; font-family: 'Exo 2', sans-serif; font-size: 0.8rem; color: #c090b0; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.active { background: rgba(255,45,120,0.2); border-color: rgba(255,45,120,0.55); color: #fff; }
    .export-btn { margin-left: auto; background: rgba(0,245,255,0.08); border: 1px solid rgba(0,245,255,0.3); border-radius: 20px; padding: 7px 18px; cursor: pointer; font-family: 'Exo 2', sans-serif; font-size: 0.8rem; color: #00f5ff; transition: all 0.2s; }
    .export-btn:hover { background: rgba(0,245,255,0.2); }

    /* Summary cards */
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 36px; }
    .stat-card { background: rgba(255,45,120,0.06); border: 1px solid rgba(255,45,120,0.2); border-radius: 14px; padding: 20px 18px; text-align: center; }
    .stat-val { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; color: #ff2d78; }
    .stat-label { font-size: 0.75rem; color: #9080b0; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

    /* Table */
    .section-label { font-family: 'Orbitron', sans-serif; font-size: 0.78rem; color: #ff2d78; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; }
    .table-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid rgba(255,45,120,0.2); }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead tr { background: rgba(255,45,120,0.12); }
    th { padding: 12px 16px; text-align: left; font-family: 'Orbitron', sans-serif; font-size: 0.65rem; letter-spacing: 2px; color: #ff2d78; white-space: nowrap; }
    td { padding: 11px 16px; border-top: 1px solid rgba(255,45,120,0.08); color: #d0c0e0; }
    tbody tr:hover { background: rgba(255,45,120,0.05); }
    .badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:0.7rem; font-family:'Orbitron',sans-serif; letter-spacing:1px; }
    .badge-ruler { background:rgba(0,245,255,0.1); border:1px solid rgba(0,245,255,0.3); color:#00f5ff; }
    .badge-altitude { background:rgba(255,45,120,0.1); border:1px solid rgba(255,45,120,0.3); color:#ff2d78; }
    .score-high { color: #40e080; font-weight: 700; }
    .score-mid  { color: #ffb300; }
    .score-low  { color: #ff5060; }

    footer { text-align: center; padding: 30px; color: rgba(144,128,176,0.4); font-size: 0.8rem; border-top: 1px solid rgba(180,79,255,0.1); }
    /* ── Light Mode ── */
    body.light-mode { background: #f4eeff; color: #1a0030; }
    body.light-mode .topnav { background: rgba(244,238,255,0.95); border-bottom-color: rgba(180,79,255,0.2); }
    body.light-mode .nav-link { color: #5a4a8a; }
    body.light-mode .nav-link:hover { color: #1a0030; background: rgba(180,79,255,0.12); }
    body.light-mode .auth-btn { background: rgba(180,79,255,0.08); border-color: rgba(180,79,255,0.25); color: #5a4a8a; }
    body.light-mode .auth-btn:hover { color: #1a0030; }
    body.light-mode .stat-card { background: rgba(255,255,255,0.9); border-color: rgba(180,79,255,0.2); }
    body.light-mode .stat-label { color: #5a4a8a; }
    body.light-mode .filter-bar { background: rgba(255,255,255,0.85); border-color: rgba(180,79,255,0.2); }
    body.light-mode .filter-btn { color: #5a4a8a; border-color: rgba(180,79,255,0.2); }
    body.light-mode .filter-btn.active { background: rgba(180,79,255,0.15); color: #6030a0; border-color: rgba(180,79,255,0.4); }
    body.light-mode .score-table { background: rgba(255,255,255,0.9); border-color: rgba(180,79,255,0.15); }
    body.light-mode .score-table th { background: rgba(180,79,255,0.08); color: #5a4a8a; }
    body.light-mode .score-table td { color: #1a0030; border-color: rgba(180,79,255,0.08); }
    body.light-mode .score-table tr:hover td { background: rgba(180,79,255,0.05); }
    body.light-mode footer { color: rgba(90,74,130,0.55); border-top-color: rgba(180,79,255,0.12); background: #f4eeff; }
    .theme-toggle { position:fixed; bottom:24px; right:24px; z-index:200; width:50px; height:50px; border-radius:50%; border:1px solid rgba(180,79,255,0.4); background:rgba(20,0,40,0.85); backdrop-filter:blur(10px); cursor:pointer; font-size:1.4rem; display:flex; align-items:center; justify-content:center; transition:transform 0.2s, box-shadow 0.2s; box-shadow:0 4px 18px rgba(0,0,0,0.4); }
    .theme-toggle:hover { transform:scale(1.12); box-shadow:0 6px 28px rgba(180,79,255,0.5); }
    body.light-mode .theme-toggle { background:rgba(255,255,255,0.92); border-color:rgba(180,79,255,0.25); box-shadow:0 4px 18px rgba(180,79,255,0.15); }
  </style>
</head>
<body>

<nav class="topnav">
  <a href="index.html" class="nav-brand">&#9889; TECH CLASS</a>
  <div class="nav-links">
    <a href="rockets.html" class="nav-link">&#128640; Rockets</a>
    <a href="measuring.html" class="nav-link">&#128208; Measuring</a>
    <a href="sailboat.html" class="nav-link">&#9973; Sail Cars</a>
    <a href="dashboard.html" class="nav-link active">&#128202; Dashboard</a>
  </div>
  <button id="auth-btn" class="auth-btn">
    <img id="auth-avatar" style="display:none">
    <span id="auth-name">Sign In</span>
  </button>
</nav>

<div class="banner">
  <div class="banner-title">TEACHER DASHBOARD</div>
  <div class="banner-sub">Student Progress &bull; Scores &bull; Activity</div>
</div>

<div class="content">
  <div id="dash-status">Checking access...</div>
  <div id="dash-body" style="display:none">

    <div class="summary-grid">
      <div class="stat-card"><div class="stat-val" id="stat-students">—</div><div class="stat-label">Students</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-sessions">—</div><div class="stat-label">Total Sessions</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-avg">—</div><div class="stat-label">Avg Score</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-wins">—</div><div class="stat-label">Perfect Scores</div></div>
    </div>

    <div class="controls">
      <span class="filter-label">Game:</span>
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('ruler-game', this)">Ruler Game</button>
      <button class="filter-btn" onclick="setFilter('altitude-calculator', this)">Altitude Calc</button>
      <button class="export-btn" onclick="exportCSV()">&#8595; Export CSV</button>
    </div>

    <div class="section-label">Recent Activity</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Student</th>
            <th>Game</th>
            <th>Score</th>
            <th>Mode</th>
            <th>Difficulty</th>
            <th>Date &amp; Time</th>
          </tr>
        </thead>
        <tbody id="score-tbody"></tbody>
      </table>
    </div>

  </div>
</div>

<footer>Technology Class &copy; 2025 &mdash; Teacher View</footer>

<script type="module">
import { FIREBASE_CONFIG, TEACHER_EMAILS } from './firebase-config.js';
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged }
                             from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, query, orderBy, limit, getDocs }
                             from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── Auth button ────────────────────────────────────────────────────
onauthStateChanged(auth, user => {
  const btn    = document.getElementById('auth-btn');
  const avatar = document.getElementById('auth-avatar');
  const name   = document.getElementById('auth-name');
  if (user) {
    btn.onclick = () => signOut(auth);
    btn.title = 'Sign out';
    if (avatar) { avatar.src = user.photoURL || ''; avatar.style.display = 'inline-block'; }
    if (name)   name.textContent = user.displayName?.split(' ')[0] || user.email;
    btn.classList.add('signed-in');
  } else {
    btn.onclick = doSignIn;
    btn.title = 'Sign in';
    if (avatar) avatar.style.display = 'none';
    if (name)   name.textContent = 'Sign In';
    btn.classList.remove('signed-in');
  }
});

async function doSignIn() {
  try { await signInWithRedirect(auth, new GoogleAuthProvider()); } catch(e) { console.error(e); }
}

getRedirectResult(auth).catch(e => console.error('Redirect result error', e));

// ── Teacher access guard ──────────────────────────────────────────────
let allRows = [];
let activeFilter = 'all';

onAuthStateChanged(auth, async user => {
  const status = document.getElementById('dash-status');
  const body   = document.getElementById('dash-body');
  if (!user) {
    status.textContent = 'Please sign in with your teacher Google account.';
    doSignIn();
    return;
  }
  if (!TEACHER_EMAILS.includes(user.email)) {
    status.textContent = `Signed in as ${user.email} — this page is for teachers only.`;
    return;
  }
  status.style.display = 'none';
  body.style.display   = '';
  await loadScores();
});

async function loadScores() {
  const q = query(collection(db, 'scores'), orderBy('ts', 'desc'), limit(500));
  const snap = await getDocs(q);
  allRows = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderTable(allRows);
  renderStats(allRows);
}

// ── Filtering ─────────────────────────────────────────────────────
window.setFilter = function(game, btn) {
  activeFilter = game;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = game === 'all' ? allRows : allRows.filter(r => r.game === game);
  renderTable(filtered);
  renderStats(filtered);
};

// ── Stats ─────────────────────────────────────────────────────────
function renderStats(rows) {
  const students = new Set(rows.map(r => r.uid)).size;
  const scores   = rows.map(r => r.score).filter(s => s != null);
  const avg      = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : '—';
  const wins     = rows.filter(r => r.score >= 50).length;
  document.getElementById('stat-students').textContent = students;
  document.getElementById('stat-sessions').textContent = rows.length;
  document.getElementById('stat-avg').textContent      = avg;
  document.getElementById('stat-wins').textContent     = wins;
}

// ── Table ─────────────────────────────────────────────────────────
function scoreClass(score, game) {
  if (game === 'ruler-game') {
    if (score >= 50) return 'score-high';
    if (score >= 25) return 'score-mid';
    return 'score-low';
  }
  return '';
}

function gameBadge(game) {
  if (game === 'ruler-game')         return `<span class="badge badge-ruler">Ruler</span>`;
  if (game === 'altitude-calculator') return `<span class="badge badge-altitude">Altitude</span>`;
  return `<span class="badge">${game}</span>`;
}

function formatDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' }) + ' ' +
         d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
}

function renderTable(rows) {
  const tbody = document.getElementById('score-tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#6050a0;padding:30px;">No scores recorded yet.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${r.displayName || r.email}</td>
      <td>${gameBadge(r.game)}</td>
      <td class="${scoreClass(r.score, r.game)}">${r.score ?? '—'}</td>
      <td style="text-transform:capitalize">${r.mode || '—'}</td>
      <td>${r.difficulty ? '1/' + r.difficulty : '—'}</td>
      <td style="color:#9080b0">${formatDate(r.ts)}</td>
    </tr>`).join('');
}

// ── CSV Export ────────────────────────────────────────────────
window.exportCSV = function() {
  const filtered = activeFilter === 'all' ? allRows : allRows.filter(r => r.game === activeFilter);
  const header = 'Student,Email,Game,Score,Mode,Difficulty,Date';
  const lines  = filtered.map(r => [
    `"${r.displayName || ''}"`  ,
    `"${r.email || ''}"`,
    r.game || '',
    r.score ?? '',
    r.mode || '',
    r.difficulty ? '1/' + r.difficulty : '',
    r.ts ? (r.ts.toDate ? r.ts.toDate() : new Date(r.ts)).toISOString() : ''
  ].join(','));
  const csv  = [header, ...lines].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url; a.download = 'techclass-scores.csv';
  a.click(); URL.revokeObjectURL(url);
};
</script>

<button class="theme-toggle" id="theme-toggle" title="Toggle light / dark mode">☀️</button>
<script>
(function(){const btn=document.getElementById('theme-toggle'),body=document.body;function apply(light){body.classList.toggle('light-mode',light);btn.textContent=light?'🌙':'☀️';btn.title=light?'Switch to dark mode':'Switch to light mode';}apply(localStorage.getItem('theme')==='light');btn.addEventListener('click',()=>{const light=!body.classList.contains('light-mode');apply(light);localStorage.setItem('theme',light?'light':'dark');});})();
</script>
</body>
</html>
